name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./cmd/veqri-core ./cmd/veqri-cli

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '24.17.0'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

  native-release:
    name: native release (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x64
            runner: ubuntu-24.04
            executable_suffix: ''
            desktop_entry: veqri-desktop
            managed_core_entry: build/release/veqri-desktop
            webkit_version: '4.1'
            service_asset: deploy/systemd/veqri-core.service
          - artifact: macos-arm64
            runner: macos-15
            executable_suffix: ''
            desktop_entry: Veqri.app
            managed_core_entry: build/release/Veqri.app/Contents/MacOS/veqri-desktop
            webkit_version: auto
            service_asset: deploy/launchd/ai.veqri.core.plist
          - artifact: macos-x64
            runner: macos-15-intel
            executable_suffix: ''
            desktop_entry: Veqri.app
            managed_core_entry: build/release/Veqri.app/Contents/MacOS/veqri-desktop
            webkit_version: auto
            service_asset: deploy/launchd/ai.veqri.core.plist
          - artifact: windows-x64
            runner: windows-2025
            executable_suffix: .exe
            desktop_entry: veqri-desktop.exe
            managed_core_entry: build/release/veqri-desktop.exe
            webkit_version: auto
            service_asset: deploy/windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version: '24.17.0'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Test native bridge on Linux
        if: runner.os == 'Linux'
        working-directory: apps/desktop/native
        run: go test -tags webkit2_41 ./...
      - name: Test native bridge
        if: runner.os != 'Linux'
        working-directory: apps/desktop/native
        run: go test ./...
      - name: Build self-contained desktop application
        env:
          VEQRI_WEBKIT2GTK_VERSION: ${{ matrix.webkit_version }}
        run: go run ./cmd/veqri-build --skip-npm-ci desktop
      - name: Build Core and CLI
        run: |
          go build -trimpath -o build/bin/veqri-core${{ matrix.executable_suffix }} ./cmd/veqri-core
          go build -trimpath -o build/bin/veqri${{ matrix.executable_suffix }} ./cmd/veqri-cli
      - name: Smoke-test packaged runtime
        run: go run ./scripts/release-smoke.go --core build/bin/veqri-core${{ matrix.executable_suffix }} --cli build/bin/veqri${{ matrix.executable_suffix }}
      - name: Smoke-test managed Core inside desktop executable
        run: go run ./scripts/release-smoke.go --core "${{ matrix.managed_core_entry }}" --core-arg=--veqri-managed-core --cli build/bin/veqri${{ matrix.executable_suffix }}
      - name: Package Unix application
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          DESKTOP_ENTRY: ${{ matrix.desktop_entry }}
        run: tar -czf "build/veqri-${ARTIFACT_NAME}.tar.gz" -C build/release "${DESKTOP_ENTRY}"
      - name: Package Unix service tools
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          SERVICE_ASSET: ${{ matrix.service_asset }}
        run: tar -czf "build/veqri-${ARTIFACT_NAME}-service-tools.tar.gz" build/bin/veqri build/bin/veqri-core "${SERVICE_ASSET}" docs/DEPLOYMENT.md
      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          DESKTOP_ENTRY: ${{ matrix.desktop_entry }}
        run: Compress-Archive -Path "build/release/$env:DESKTOP_ENTRY" -DestinationPath "build/veqri-$env:ARTIFACT_NAME.zip"
      - name: Package Windows service tools
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          SERVICE_ASSET: ${{ matrix.service_asset }}
        run: |
          $staging = "build/service-tools-$env:ARTIFACT_NAME"
          New-Item -ItemType Directory -Force -Path "$staging/build/bin", "$staging/deploy/windows", "$staging/docs" | Out-Null
          Copy-Item "build/bin/veqri.exe", "build/bin/veqri-core.exe" -Destination "$staging/build/bin"
          Copy-Item -Recurse -Force -Path (Join-Path $env:SERVICE_ASSET '*') -Destination "$staging/deploy/windows"
          Copy-Item "docs/DEPLOYMENT.md" -Destination "$staging/docs/DEPLOYMENT.md"
          Compress-Archive -Path "$staging/*" -DestinationPath "build/veqri-$env:ARTIFACT_NAME-service-tools.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: veqri-${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            build/veqri-${{ matrix.artifact }}.*
      - uses: actions/upload-artifact@v4
        with:
          name: veqri-${{ matrix.artifact }}-service-tools
          if-no-files-found: error
          retention-days: 14
          path: build/veqri-${{ matrix.artifact }}-service-tools.*

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-37.0' 'build-tools;37.0.0'
      - run: ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug assembleRelease assembleDebugAndroidTest
      - name: Build staged real-Core APK through the shared entry point
        working-directory: ${{ github.workspace }}
        run: go run ./cmd/veqri-build android
      - uses: actions/upload-artifact@v4
        with:
          name: veqri-android-debug
          if-no-files-found: error
          retention-days: 14
          path: build/release/Veqri-android-debug.apk
